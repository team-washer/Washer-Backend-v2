name: Washer Prod CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Prod-CD:
    runs-on: ubuntu-latest
    environment: Prod-CD
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: zulu
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Create Profile
        env:
          APPLICATION_PROD_YML: ${{ secrets.APPLICATION_PROD_YML }}
        run: printf '%s' "$APPLICATION_PROD_YML" > src/main/resources/application-prod.yml

      - name: Build bootJar
        run: ./gradlew bootJar -x test --no-daemon

      - name: Rename JAR
        run: mv $(ls build/libs/*.jar | grep -v plain) build/libs/app.jar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Make ZIP File
        run: |
          mkdir -p deploy-package
          cp build/libs/app.jar deploy-package/
          cp prod.dockerfile deploy-package/
          cp appspec.yml deploy-package/
          cp -r scripts deploy-package/
          cd deploy-package
          zip -r ../$GITHUB_SHA.zip .

      - name: Upload to S3
        run: aws s3 cp --region ${{ secrets.AWS_REGION }} ./$GITHUB_SHA.zip s3://${{ secrets.AWS_S3_BUCKET_NAME }}/prod/$GITHUB_SHA.zip

      - name: Code Deploy
        run: aws deploy create-deployment --application-name washer-prod-server-codedeploy --deployment-config-name CodeDeployDefault.AllAtOnce --deployment-group-name washer-prod-server --s3-location bucket=${{ secrets.AWS_S3_BUCKET_NAME }},bundleType=zip,key=prod/$GITHUB_SHA.zip

      - name: Notify CD Success
        uses: sarisia/actions-status-discord@v1
        if: success()
        with:
          webhook: ${{ secrets.DISCORD_INFORMATION_ALERT_CHANNEL_WEBHOOK }}
          color: 0x4CAF50

      - name: Notify CD Failure
        uses: sarisia/actions-status-discord@v1
        if: failure()
        with:
          webhook: ${{ secrets.DISCORD_INFORMATION_ALERT_CHANNEL_WEBHOOK }}
          color: 0xFF4C4C

      - name: Notify CD Cancelled
        uses: sarisia/actions-status-discord@v1
        if: cancelled()
        with:
          webhook: ${{ secrets.DISCORD_INFORMATION_ALERT_CHANNEL_WEBHOOK }}
          color: 0xFF4C4C
