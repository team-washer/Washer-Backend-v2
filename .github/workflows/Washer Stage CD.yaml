name: Washer Stage CD
on:
  push:
    branches:
      - develop
  workflow_dispatch:
jobs:
  Stage-CD:
    runs-on: ubuntu-latest
    environment: Stage-CD
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: zulu
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Create Profile
        env:
          APPLICATION_STAGE_YML: ${{ secrets.APPLICATION_STAGE_YML }}
        run: printf '%s' "$APPLICATION_STAGE_YML" > src/main/resources/application-stage.yml

      - name: Build bootJar
        run: ./gradlew bootJar -x test --no-daemon

      - name: Rename JAR
        run: mv $(ls build/libs/*.jar | grep -v plain) build/libs/app.jar

      - name: Deploy to Server
        uses: 8G4B/GSM-SV-Deploy@v1.2.1
        with:
          host: ${{ secrets.SSH_HOST }}
          user: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source_path: .
          target_path: /app/washer

      - name: Notify CD Success
        uses: sarisia/actions-status-discord@v1
        if: success()
        with:
          webhook: ${{ secrets.DISCORD_INFORMATION_ALERT_CHANNEL_WEBHOOK }}
          color: 0x4CAF50

      - name: Notify CD Failure
        uses: sarisia/actions-status-discord@v1
        if: failure()
        with:
          webhook: ${{ secrets.DISCORD_INFORMATION_ALERT_CHANNEL_WEBHOOK }}
          color: 0xFF4C4C

      - name: Notify CD Cancelled
        uses: sarisia/actions-status-discord@v1
        if: cancelled()
        with:
          webhook: ${{ secrets.DISCORD_INFORMATION_ALERT_CHANNEL_WEBHOOK }}
          color: 0xFF4C4C
