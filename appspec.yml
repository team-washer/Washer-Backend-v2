version: 0.0
os: linux

files:
  - source: /
    destination: /home/ec2-user/builds
    overwrite: yes

file_exists_behavior: OVERWRITE
permissions:
  - object: /
    pattern: "**"
    owner: ec2-user
    group: ec2-user

hooks:
  ApplicationStop:
    - location: scripts/prod/stop.sh
      timeout: 300
  ApplicationStart:
    - location: scripts/prod/start.sh
      timeout: 300