spring:
  application:
    name: Washer-Backend-v2
  datasource:
    url: jdbc:mysql://amond-server.kro.kr:3306/washer
    username: root
    password: rootpassword
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
          max-wait: -1ms
  security:
    cors:
      allowed-origins:
        - '*'
  docker:
    compose:
      enabled: true
server:
  port: 8080
  shutdown: immediate
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600
  refresh-token-expiration: 2592000
third-party:
  discord:
    webhook-url: ${DISCORD_WEBHOOK_URL:https://discord.com/api/webhooks/your-webhook-url}
  smartthings:
    api-url: ${SMARTTHINGS_API_URL:https://api.smartthings.com}
    oauth-url: ${SMARTTHINGS_OAUTH_URL:https://api.smartthings.com/oauth/token}
    authorize-url: ${SMARTTHINGS_AUTHORIZE_URL:https://api.smartthings.com/oauth/authorize}
    redirect-uri: ${SMARTTHINGS_REDIRECT_URI:http://localhost:8080/api/v2/admin/smartthings/oauth/callback}
    client-id: ${SMARTTHINGS_CLIENT_ID:your-client-id}
    client-secret: ${SMARTTHINGS_CLIENT_SECRET:your-client-secret}
  datagsm:
    client-secret: ${DATAGSM_CLIENT_SECRET:your-client-secret}
sdk:
  logging:
    enabled: true
    not-logging-urls:
      - "/v3/api-docs/**"
      - "/swagger-ui/**"
  swagger:
    enabled: true
    title: "Washer API"
    description: "기숙사 세탁기 예약 관리 시스템"
    version: "v2"
    group: "Washer"
    paths-to-match:
      - "/api/v2/**"
  exception:
    enabled: false
  response:
    enabled: true
    not-wrapping-urls:
      - "/v3/api-docs/**"
      - "/v3/api-docs"
      - "/swagger-ui/**"
      - "/api/v2/admin/smartthings/oauth/authorize"
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    defaultModelsExpandDepth: -1
    docExpansion: list
    displayRequestDuration: true
    filter: true
    showCommonExtensions: true
    showExtensions: true
    deepLinking: true
    persistAuthorization: true
    tryItOutEnabled: true
    csrf:
      enabled: false